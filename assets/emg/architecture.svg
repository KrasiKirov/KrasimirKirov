<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EMG to torque pipeline: four-channel surface EMG is bandpassed, rectified, low-pass filtered and MVC-normalised into envelopes, cut into leakage-free windows, then fed to a TensorFlow and Keras LSTM that predicts ankle torque, scored by within-subject and cross-subject R squared and RMSE across eight joint angles">
  <defs>
    <marker id="emgArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#45535e" />
    </marker>
  </defs>
  <style>
    .box { fill: #f7f1e3; stroke-width: 1.5; }
    .t { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 13px; font-weight: 700; fill: #1e2833; }
    .s { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 10px; fill: #45535e; }
    .row { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; fill: #2c7a49; }
    .wire { stroke: #45535e; stroke-width: 1.5; fill: none; }
    .note { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 9.5px; fill: #2c7a49; font-weight: 700; }
  </style>
  <rect x="0" y="0" width="760" height="300" fill="#f2ecdd" stroke="#d9d0bb" />

  <text class="row" x="14" y="26">01 — SIGNAL TO ENVELOPE</text>

  <rect class="box" x="14" y="38" width="170" height="54" rx="10" stroke="#45535e" />
  <text class="t" x="26" y="60">4-channel sEMG</text>
  <text class="s" x="26" y="78">raw muscle activation</text>

  <line class="wire" x1="184" y1="65" x2="216" y2="65" marker-end="url(#emgArrow)" />

  <rect class="box" x="218" y="38" width="248" height="54" rx="10" stroke="#1a6b91" />
  <text class="t" x="230" y="60">Bandpass, rectify, low-pass</text>
  <text class="s" x="230" y="78">envelope extraction</text>

  <line class="wire" x1="466" y1="65" x2="498" y2="65" marker-end="url(#emgArrow)" />

  <rect class="box" x="500" y="38" width="246" height="54" rx="10" stroke="#1a6b91" />
  <text class="t" x="512" y="60">MVC normalise</text>
  <text class="s" x="512" y="78">comparable across subjects</text>

  <text class="row" x="14" y="140">02 — PREDICT</text>

  <rect class="box" x="14" y="152" width="228" height="54" rx="10" stroke="#c9552f" />
  <text class="t" x="26" y="174">Leakage-free windows</text>
  <text class="s" x="26" y="192">no samples shared across splits</text>

  <line class="wire" x1="242" y1="179" x2="274" y2="179" marker-end="url(#emgArrow)" />

  <rect class="box" x="276" y="152" width="212" height="54" rx="10" stroke="#c9552f" />
  <text class="t" x="288" y="174">LSTM</text>
  <text class="s" x="288" y="192">TensorFlow / Keras</text>

  <line class="wire" x1="488" y1="179" x2="520" y2="179" marker-end="url(#emgArrow)" />

  <rect class="box" x="522" y="152" width="224" height="54" rx="10" stroke="#2c7a49" />
  <text class="t" x="534" y="174">Ankle torque</text>
  <text class="s" x="534" y="192">predicted from activation</text>

  <text class="row" x="14" y="252">03 — SCORE HONESTLY</text>

  <rect class="box" x="176" y="240" width="252" height="46" rx="10" stroke="#45535e" />
  <text class="t" x="188" y="262">Within + cross-subject</text>
  <text class="s" x="188" y="278">held-out people, not just trials</text>

  <line class="wire" x1="428" y1="263" x2="460" y2="263" marker-end="url(#emgArrow)" />

  <rect class="box" x="462" y="240" width="284" height="46" rx="10" stroke="#2c7a49" />
  <text class="t" x="474" y="262">Pooled R2 &#8805; 0.96</text>
  <text class="s" x="474" y="278">per-position R2 + RMSE, 8 angles</text>

  <path class="wire" d="M 634 206 L 634 224 L 302 224 L 302 236" marker-end="url(#emgArrow)" />
</svg>
