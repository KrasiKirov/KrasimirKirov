<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Listening Room architecture: a React Native app authenticates with Spotify via PKCE keeping tokens in device secure storage, a FastAPI backend prompts OpenAI for a JSON tracklist, and each generated track is resolved against the Spotify catalog before being saved as a private playlist">
  <defs>
    <marker id="lrArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#45535e" />
    </marker>
  </defs>
  <style>
    .box { fill: #f7f1e3; stroke-width: 1.5; }
    .t { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 13px; font-weight: 700; fill: #1e2833; }
    .s { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 10px; fill: #45535e; }
    .row { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; fill: #2c7a49; }
    .wire { stroke: #45535e; stroke-width: 1.5; fill: none; }
    .note { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 9.5px; fill: #2c7a49; font-weight: 700; }
  </style>
  <rect x="0" y="0" width="760" height="300" fill="#f2ecdd" stroke="#d9d0bb" />

  <text class="row" x="14" y="26">01 — DESCRIBE</text>

  <rect class="box" x="14" y="38" width="188" height="54" rx="10" stroke="#45535e" />
  <text class="t" x="26" y="60">"a slow evening"</text>
  <text class="s" x="26" y="78">plain language + filters</text>

  <line class="wire" x1="202" y1="65" x2="234" y2="65" marker-end="url(#lrArrow)" />

  <rect class="box" x="236" y="38" width="224" height="54" rx="10" stroke="#1a6b91" />
  <text class="t" x="248" y="60">React Native app</text>
  <text class="s" x="248" y="78">Expo · Spotify PKCE auth</text>

  <line class="wire" x1="460" y1="65" x2="492" y2="65" marker-end="url(#lrArrow)" />

  <rect class="box" x="494" y="38" width="252" height="54" rx="10" stroke="#45535e" />
  <text class="t" x="506" y="60">Device secure store</text>
  <text class="s" x="506" y="78">tokens never persisted server-side</text>

  <text class="row" x="14" y="140">02 — COMPOSE</text>

  <rect class="box" x="14" y="152" width="224" height="54" rx="10" stroke="#45535e" />
  <text class="t" x="26" y="174">FastAPI on Railway</text>
  <text class="s" x="26" y="192">prompt + genre, decade, mood</text>

  <line class="wire" x1="238" y1="179" x2="270" y2="179" marker-end="url(#lrArrow)" />

  <rect class="box" x="272" y="152" width="212" height="54" rx="10" stroke="#c9552f" />
  <text class="t" x="284" y="174">OpenAI</text>
  <text class="s" x="284" y="192">JSON-structured tracklist</text>

  <line class="wire" x1="484" y1="179" x2="516" y2="179" marker-end="url(#lrArrow)" />

  <rect class="box" x="518" y="152" width="228" height="54" rx="10" stroke="#1a6b91" />
  <text class="t" x="530" y="174">Resolve on Spotify</text>
  <text class="s" x="530" y="192">match each track in catalog</text>

  <text class="row" x="14" y="252">03 — SAVE</text>

  <rect class="box" x="150" y="240" width="196" height="46" rx="10" stroke="#45535e" />
  <text class="t" x="162" y="262">Preview &amp; curate</text>
  <text class="s" x="162" y="278">drop tracks · rename</text>

  <line class="wire" x1="346" y1="263" x2="378" y2="263" marker-end="url(#lrArrow)" />

  <rect class="box" x="380" y="240" width="212" height="46" rx="10" stroke="#2c7a49" />
  <text class="t" x="392" y="262">Private playlist</text>
  <text class="s" x="392" y="278">written to the account</text>

  <path class="wire" d="M 632 206 L 632 224 L 260 224 L 260 236" marker-end="url(#lrArrow)" />
</svg>
